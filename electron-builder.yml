appId: com.instalib.app
productName: Instalib
directories:
  output: dist
  buildResources: build
files:
  - out/**
asarUnpack:
  - '**/*.node'
npmRebuild: true
win:
  target:
    - portable
portable:
  artifactName: '${productName}-${version}-portable.${ext}'
mac:
  target:
    - zip
  identity: null
  hardenedRuntime: false
linux:
  target:
    - AppImage
  category: AudioVideo
